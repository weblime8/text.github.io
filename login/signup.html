    <link rel="stylesheet" type="text/css" href="./css/bootstrap-sbadmin-4.5.3.css?t=1703731942">

<body class="bg-gradient-primary">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-6 col-lg-10 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-12 p-5">
                                <div class="text-center">
                                    <h1 class="h4 text-gray-900 mb-4">注册账号</h1>
                                </div>
                                <div class="alert alert-danger" style="display: none;" id="send-btn-resp"></div>

                                <div class="form-group">
                                    <input type="email" class="form-control form-control-user" id="mail" name="mail" aria-describedby="emailHelp" placeholder="邮箱" required autofocus>
                                </div>
                                <div class="form-group">
                                    <input type="password" class="form-control form-control-user" minlength="6" id="passwd" autocomplete="new-password" name="passwd" placeholder="密码" required>
                                </div>
                                <div class="form-group">
                                    <input type="password" class="form-control form-control-user" minlength="6" id="repasswd" name="repasswd" placeholder="再次输入密码" required>
                                </div>
                                <button class="btn btn-success btn-user btn-block" type="submit">注册</button>
                                <hr>
                                <div class="text-center"><a href="./signin.html">登录</a></div>
                                <hr>
                                <div class="text-center"><a href="/index.html" class="small" role="button">&larr;返回首页</a></div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>
